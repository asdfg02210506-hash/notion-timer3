<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "Noto Sans TC", sans-serif;
}

.box {
    text-align: center;
    color: black;
    padding: 10px;
}

.title {
    font-size: 16px;
    opacity: 0.7;
    margin-bottom: 6px;
}

.timer {
    font-size: 32px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
    <div class="title">自 2025/07/02 起</div>
    <div class="timer" id="timer">載入中...</div>
</div>

<script>
const start = new Date(2025, 6, 2).getTime(); // 2025/07/02

function update() {
    const now = Date.now();
    const diff = now - start;

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff / 3600000) % 24);
    const m = Math.floor((diff / 60000) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerText =
        `${d}天 ${h}時 ${m}分 ${s}秒`;
}

update();
setInterval(update, 1000);
</script>

</body>
</html>`
